name: 📱 E2E (agent-device)

on:
  # Validate the agent-device setup whenever the e2e config changes.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "e2e/**"
      - ".github/workflows/agent-device-e2e.yml"
      - "package.json"
  # Full device run is manual for now — it needs a built app + simulator.
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight check: install agent-device and verify the CLI is wired up.
  # Runs on the default Ubuntu runner — no app build, no simulator.
  setup-check:
    name: agent-device setup check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Verify agent-device CLI
        run: yarn agent-device --version

  # Full e2e run against a built app on a macOS runner (iOS simulator).
  # Manual only until app builds are wired up in CI.
  #
  # Which flows run is chosen by Sniffler (see .github/workflows/e2e-impact.yml
  # for the PR-time report): only the impacted flows run when Sniffler produces
  # a partial selection, otherwise the FULL suite runs (fail-open).
  e2e-ios:
    name: iOS e2e (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so Sniffler can diff against the base branch.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      # iOS native-build caches. These are harmless no-ops today because this
      # job does not yet run `expo prebuild` / `pod install` / an Xcode build
      # (see the TODO further down) — there is nothing to populate them with.
      # They are wired up now so that the day an iOS build step lands, warm
      # CocoaPods + DerivedData caches make it dramatically faster. Keyed on
      # ios/Podfile.lock (generated by prebuild) with a yarn.lock fallback, so
      # the key stays stable until either lockfile changes.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/Podfile.lock', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      # Select the agent-device flows impacted by this branch. Sets $E2E_FLOWS
      # (space-separated flow list) for the run step below, defaulting to the
      # full suite (`e2e/flows`) whenever Sniffler errors or finds no partial
      # impact. Never fails the job.
      - name: Select impacted e2e flows (Sniffler)
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref || 'main' }}" || true
          set +e
          yarn sniffler impact --base "$BASE_REF" --head HEAD --format json > sniffler.json 2> sniffler.err
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "⚠️ Sniffler failed (exit $STATUS) — failing open, running the FULL e2e suite." | tee -a "$GITHUB_STEP_SUMMARY"
            cat sniffler.err 2>/dev/null || true
            echo "E2E_FLOWS=e2e/flows" >> "$GITHUB_ENV"
            exit 0
          fi
          FLOWS=$(node -e 'const fs=require("fs");let d;try{d=JSON.parse(fs.readFileSync("sniffler.json","utf8"))}catch(e){process.exit(3)}process.stdout.write((d.recommendedTests||[]).map(t=>t.test).join(" "))')
          if [ $? -ne 0 ] || [ -z "$FLOWS" ]; then
            echo "No partial impact detected (or unparseable) — running the FULL e2e suite." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "E2E_FLOWS=e2e/flows" >> "$GITHUB_ENV"
          else
            echo "Running impacted flows only: $FLOWS" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "E2E_FLOWS=$FLOWS" >> "$GITHUB_ENV"
          fi

      - name: agent-device doctor
        run: yarn e2e:doctor

      # TODO: build + install the app on a booted simulator before running checks.
      #   - yarn prebuild --platform ios
      #   - <build the iOS app and boot a simulator>
      #   - <install the .app on the simulator>
      - name: Run recorded e2e checks
        run: yarn agent-device test ${E2E_FLOWS:-e2e/flows}
        continue-on-error: true # remove once the app build step above is in place

  # Full e2e run against a built app on an Android emulator (Ubuntu runner).
  # Manual only (workflow_dispatch) and best-effort: it is NOT a required check
  # and has NOT been validated in CI yet — trigger it from the Actions tab to
  # confirm it works on a real emulator.
  #
  # Flow selection works the same as the iOS job (Sniffler → $E2E_FLOWS).
  e2e-android:
    name: Android e2e (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so Sniffler can diff against the base branch.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caches the Gradle user home (deps + wrapper) and build cache across runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install

      # Select the agent-device flows impacted by this branch (sets $E2E_FLOWS).
      # Defaults to the full suite (`e2e/flows`) on error / no partial impact.
      - name: Select impacted e2e flows (Sniffler)
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref || 'main' }}" || true
          set +e
          yarn sniffler impact --base "$BASE_REF" --head HEAD --format json > sniffler.json 2> sniffler.err
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "⚠️ Sniffler failed (exit $STATUS) — failing open, running the FULL e2e suite." | tee -a "$GITHUB_STEP_SUMMARY"
            cat sniffler.err 2>/dev/null || true
            echo "E2E_FLOWS=e2e/flows" >> "$GITHUB_ENV"
            exit 0
          fi
          FLOWS=$(node -e 'const fs=require("fs");let d;try{d=JSON.parse(fs.readFileSync("sniffler.json","utf8"))}catch(e){process.exit(3)}process.stdout.write((d.recommendedTests||[]).map(t=>t.test).join(" "))')
          if [ $? -ne 0 ] || [ -z "$FLOWS" ]; then
            echo "No partial impact detected (or unparseable) — running the FULL e2e suite." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "E2E_FLOWS=e2e/flows" >> "$GITHUB_ENV"
          else
            echo "Running impacted flows only: $FLOWS" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "E2E_FLOWS=$FLOWS" >> "$GITHUB_ENV"
          fi

      - name: agent-device doctor
        run: yarn e2e:doctor
        continue-on-error: true

      # The `expo-font` plugin reads Artsy's Unica77LL fonts from assets/fonts,
      # which are gitignored and fetched by `yarn setup:artsy` from a private S3
      # bucket (unavailable in OSS CI). Create empty placeholders so `expo
      # prebuild` resolves them; the smoke test falls back to system fonts.
      - name: Create placeholder fonts for prebuild
        run: |
          mkdir -p assets/fonts
          touch assets/fonts/Unica77LL-Italic.otf \
                assets/fonts/Unica77LL-MediumItalic.otf \
                assets/fonts/Unica77LL-Medium.otf \
                assets/fonts/Unica77LL-Regular.otf

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android

      # The release build bundles JS at build time, so the Relay artifacts must
      # exist or Metro fails to resolve co-located queries. (They're committed,
      # but regenerate to be safe against a stale checkout.)
      - name: Compile Relay
        run: yarn relay

      # Build a RELEASE APK, not debug: a debug build with expo-dev-client boots
      # into the dev-client launcher (needs Metro), so the app UI never renders
      # in CI. The release APK embeds the JS bundle and drops the dev launcher.
      # SENTRY_DISABLE_AUTO_UPLOAD skips the sourcemap upload that needs a token.
      - name: Build release APK
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: ./gradlew assembleRelease --build-cache
        working-directory: android

      # Hardware acceleration for the emulator on the Ubuntu runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # No continue-on-error: the manual job now reflects the real launch-smoke
      # result. The run step retries to absorb agent-device's intermittent
      # app-launch flake (occasionally the home launcher stays foreground
      # instead of the app after install), force-stopping the app between tries
      # so each attempt cold-launches it.
      - name: Run agent-device e2e on emulator
        uses: reactivecircus/android-emulator-runner@v2.33.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            attempts=3
            n=0
            until [ "$n" -ge "$attempts" ]; do
              n=$((n + 1))
              echo "::group::agent-device e2e attempt $n/$attempts"
              if yarn agent-device test ${E2E_FLOWS:-e2e/flows}; then
                echo "::endgroup::"
                echo "agent-device e2e passed on attempt $n"
                exit 0
              fi
              echo "::endgroup::"
              echo "attempt $n failed; force-stopping the app and retrying"
              adb shell am force-stop net.artsy.energy || true
              sleep 5
            done
            echo "agent-device e2e failed after $attempts attempts"
            exit 1
