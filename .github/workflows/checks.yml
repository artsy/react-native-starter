name: ✅ Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: type-check · test · lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # No lockfile is committed yet (private @artsy packages resolve on install),
      # so allow the install to write one instead of failing the CI immutability check.
      YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn + Metro
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Compile Relay
        run: yarn relay

      - name: Type check
        run: yarn tsc

      - name: Test
        run: yarn test --ci --maxWorkers=2

      - name: Lint
        run: yarn lint
