nodeLinker: node-modules

enableScripts: false # Disable postinstall scripts from 3rd parties

# Quarantine freshly-published packages for a day before they can be installed
# (supply-chain safety). Yarn 4.17 enforces this in hardened mode (e.g. CI on
# public PRs).
npmMinimalAgeGate: 1440 # 1 day in minutes (24 * 60)

# agent-device publishes very frequently, so pre-approve it to bypass the gate.
npmPreapprovedPackages: ["agent-device"]
